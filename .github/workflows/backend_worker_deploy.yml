name: Deploy Backend to AWS Lambda Worker

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare lambda build folder
        run: |
          rm -rf lambda_package
          mkdir -p lambda_package

          cp -r Backend/agents lambda_package/
          cp Backend/worker/*.py lambda_package/
          cp Backend/requirements.txt lambda_package/

      - name: Build dependencies inside Lambda Python 3.11 image
        run: |
          docker run --rm \
            -v "$PWD/lambda_package":/var/task \
            public.ecr.aws/lambda/python:3.11 \
            /bin/sh -c "
              python -m pip install --upgrade pip &&
              pip install -r requirements.txt -t . &&
              zip -r9 function_worker.zip .
            "

      - name: Move ZIP from Docker volume to root
        run: mv lambda_package/function_worker.zip .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWSKEYID }}
          aws-secret-access-key: ${{ secrets.AWSACCESSKEY }}
          aws-region: us-east-2

      - name: Upload ZIP to S3
        run: aws s3 cp function_worker.zip s3://my-handy-ai-bucket-deploy/function_worker.zip

      - name: Deploy from S3
        run: |
          aws lambda update-function-code \
            --function-name MyHandyWorker \
            --s3-bucket my-handy-ai-bucket-deploy \
            --s3-key function_worker.zip