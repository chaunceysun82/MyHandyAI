name: Deploy Backend to AWS Lambda Worker Stage

on:
  push:
    branches: [stage]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Prepare lambda build folder
        run: |
          rm -rf lambda_package
          mkdir -p lambda_package
          cp -r Backend/agents lambda_package/
          cp -r Backend/database lambda_package/
          cp -r Backend/config lambda_package/
          cp -r Backend/services lambda_package/
          cp Backend/worker/*.py lambda_package/
          cp Backend/worker/requirements.txt lambda_package/

      - name: Build dependencies inside Lambda Python 3.11 image
        run: |
          docker run --rm \
            -v "$PWD/lambda_package":/var/task \
            --entrypoint /bin/sh \
            public.ecr.aws/lambda/python:3.11 \
            -c "
              rm -rf cryptography* cffi* &&
              python -m pip install --upgrade pip setuptools wheel &&
              pip install \
                --platform manylinux2014_x86_64 \
                --implementation cp \
                --python-version 3.11 \
                --only-binary=:all: \
                -r requirements.txt \
                -t .
            "

      - name: Create deployment ZIP
        run: |
          cd lambda_package
          zip -r9 ../function_worker-stage.zip .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWSKEYID }}
          aws-secret-access-key: ${{ secrets.AWSACCESSKEY }}
          aws-region: us-east-2

      - name: Upload ZIP to S3
        run: |
          aws s3 cp function_worker-stage.zip s3://my-handy-ai-bucket-deploy/function_worker-stage.zip

      - name: Deploy from S3
        run: |
          aws lambda update-function-code \
          --function-name MyHandyWorker-Stage \
          --s3-bucket my-handy-ai-bucket-deploy \
          --s3-key function_worker-stage.zip
